<style>
:root{
  --navy: #03101f;
  --navy2: #061b35;
  --navy3: #082a50;
  --blue: #006fe6;
  --blue2: #0b82ff;
  --yellow: #ffb300;
  --yellow2: #ffc947;
  --white: #ffffff;
  --light: #f8fafc;
  --soft: #eef4fc;
  --ink: #0f172a;
  --muted: #475569;
  --border: #e2e8f0;
  --shadow: 0 20px 40px rgba(3,16,31,0.06);
  --shadow-hover: 0 30px 60px rgba(3,16,31,0.12);
  --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--light);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}

.header {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; height: 90px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 6%;
  background: rgba(3, 16, 31, 0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08); color: #fff;
}
.brand { display: flex; align-items: center; gap: 14px }
.logo-mark {
  width: 46px; height: 46px; border-radius: 10px; position: relative; overflow: hidden; background: #fff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2); flex-shrink: 0;
}
.logo-mark:before { content: ""; position: absolute; left: 0; bottom: 0; width: 58%; height: 62%; background: var(--blue); clip-path: polygon(0 28%, 100% 0, 100% 100%, 0 100%) }
.logo-mark:after { content: ""; position: absolute; right: 0; top: 0; width: 38%; height: 45%; background: var(--yellow); clip-path: polygon(0 0, 100% 0, 100% 100%, 0 75%) }
.logo-text { font-weight: 800; letter-spacing: 0.5px; font-size: 22px; line-height: 1 }
.logo-text span { display: block; font-size: 10px; letter-spacing: 3px; margin-top: 5px; color: #d9eaff; font-weight: 500; text-transform: uppercase; }

.nav { display: flex; align-items: center; gap: 32px; font-size: 13px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase }
.nav a { color: #fff; opacity: .85; transition: all .25s ease }
.nav a:hover { color: var(--yellow); opacity: 1 }
.nav-cta { background: var(--blue); color: #fff !important; padding: 12px 22px; border-radius: 6px; box-shadow: 0 10px 25px rgba(0,111,230,0.25); font-weight: 700; }
.nav-cta:hover { background: var(--blue2); transform: translateY(-1px); }
.mobile-menu { display: none; border: 1px solid rgba(255,255,255,.2); padding: 10px 16px; border-radius: 6px; color: #fff; font-weight: 700; font-size: 13px; cursor: pointer }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px; min-height: 52px; padding: 0 28px; border-radius: 6px;
  background: var(--blue); color: #fff; font-size: 14px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase;
  box-shadow: 0 12px 30px rgba(0,111,230,.25); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); border: 0; cursor: pointer;
}
.btn:hover { transform: translateY(-2px); background: var(--blue2); box-shadow: 0 18px 40px rgba(0,111,230,.35); }
.btn svg { width: 16px; height: 16px; transition: transform 0.2s ease; }
.btn:hover svg { transform: translateX(3px); }

.btn-yellow { background: var(--yellow); color: #071523; box-shadow: 0 12px 30px rgba(255,179,0,.2) }
.btn-yellow:hover { background: var(--yellow2); box-shadow: 0 18px 40px rgba(255,179,0,0.3); }

.hero { position: relative; min-height: 820px; padding-top: 90px; background: var(--navy); color: #fff; overflow: hidden; display: flex; align-items: center; }
.hero-bg { position: absolute; inset: 0; top: 90px; display: grid; grid-template-columns: 1.1fr .9fr }
.hero-bg:before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(3,16,31,0.98) 0%, rgba(3,16,31,0.92) 45%, rgba(3,16,31,0.5) 75%, rgba(3,16,31,0.1) 100%); z-index: 2 }
.hero-bg:after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 15% 30%, rgba(0,111,230,0.25), transparent 40%); z-index: 3; pointer-events: none }
.hero-main-img { grid-column: 1/3; width: 100%; height: 100%; object-fit: cover; }

.hero-content { position: relative; z-index: 5; padding: 80px 6%; max-width: 800px }
.eyebrow { color: var(--blue2); font-size: 13px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px }
h1 { font-size: clamp(44px, 5.5vw, 68px); line-height: 1.08; letter-spacing: -1.5px; font-weight: 800; margin-bottom: 24px }
h1 span { color: var(--yellow) }
.hero p { font-size: 18px; line-height: 1.65; color: #cbd5e1; max-width: 620px; margin-bottom: 36px }

.hero-bullets { display: grid; gap: 14px; margin-bottom: 40px; max-width: 600px }
.hero-bullets div { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 600; color: #f1f5f9 }
.check { width: 20px; height: 20px; border-radius: 50%; background: rgba(0, 111, 230, 0.2); color: var(--blue2); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; border: 1px solid rgba(0, 111, 230, 0.4); }
.hero-bullets .check { background: rgba(255, 179, 0, 0.15); color: var(--yellow); border-color: rgba(255, 179, 0, 0.4); }

.hero-actions { display: flex; gap: 16px; flex-wrap: wrap }

.stats-bar {
  position: absolute; bottom: 0; left: 6%; right: 6%; z-index: 10; transform: translateY(50%);
  display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(6, 27, 53, 0.95);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-radius: 12px; overflow: hidden
}
.stat { padding: 26px 24px; border-right: 1px solid rgba(255, 255, 255, 0.08); display: flex; align-items: center; gap: 16px }
.stat:last-child { border-right: 0 }
.stat-icon {
  width: 42px; height: 42px; border-radius: 8px; background: rgba(0, 111, 230, 0.15);
  border: 1px solid rgba(0, 111, 230, 0.3); display: flex; align-items: center; justify-content: center; color: var(--blue2);
}
.stat-icon svg { width: 20px; height: 20px; }
.stat strong { display: block; color: #fff; font-size: 24px; font-weight: 700; line-height: 1.1 }
.stat span { display: block; color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px }

.section { padding: 140px 6% 100px; background: var(--white); text-align: center }
.section.alt { background: var(--light) }
.section-head { max-width: 800px; margin: 0 auto 64px }
.label { color: var(--blue); font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px }
.section h2 { font-size: clamp(32px, 4vw, 44px); line-height: 1.15; letter-spacing: -1px; font-weight: 800; color: var(--navy); margin-bottom: 18px }
.section h2 span { color: var(--blue) }
.section-head p { color: var(--muted); font-size: 17px; line-height: 1.65; max-width: 700px; margin: 0 auto }

.services-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; text-align: left }
.service-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 32px;
  box-shadow: var(--shadow); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); min-height: 290px;
  display: flex; flex-direction: column; position: relative;
}
.service-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); border-color: rgba(0, 111, 230, 0.2); }
.icon {
  width: 48px; height: 48px; border-radius: 8px; background: var(--soft); color: var(--blue);
  display: flex; align-items: center; justify-content: center; margin-bottom: 24px; transition: all 0.2s ease;
}
.icon svg { width: 22px; height: 22px; stroke-width: 2px; fill: none; stroke: currentColor; }
.service-card:hover .icon { background: var(--blue); color: var(--white); }
.service-card h3 { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 12px; letter-spacing: -0.3px }
.service-card p { color: var(--muted); font-size: 14.5px; line-height: 1.6; margin-bottom: 24px; flex: 1 }
.service-card a {
  color: var(--blue); font-weight: 700; font-size: 13px; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 6px; letter-spacing: 0.5px; transition: gap 0.2s ease;
}
.service-card a:hover { color: var(--blue2); gap: 10px; }

.split { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; text-align: left }
.image-panel { position: relative; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-hover); height: 560px }
.image-panel img { width: 100%; height: 100%; object-fit: cover; }
.image-panel:after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(3,16,31,0) 40%, rgba(3,16,31,0.85) 100%) }
.panel-card {
  position: absolute; left: 32px; right: 32px; bottom: 32px; z-index: 2;
  background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-radius: 12px; padding: 28px; color: var(--ink); box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}
.panel-card strong { font-size: 20px; color: var(--navy); font-weight: 800; display: block; line-height: 1.3 }
.panel-card p { margin-top: 8px; color: var(--muted); line-height: 1.5; font-size: 14px }

.content-list { display: grid; gap: 16px; margin-top: 32px }
.content-list div.content-item { display: flex; gap: 18px; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: var(--shadow) }
.content-item .check { margin-top: 2px }
.content-item h3 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 6px }
.content-item p { color: var(--muted); line-height: 1.55; font-size: 14.5px }

.industries {
  background: var(--navy); color: #fff; padding: 100px 6%; text-align: center; position: relative; overflow: hidden;
}
.industries:before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 80% 20%, rgba(0,111,230,0.15), transparent 45%) }
.industries > * { position: relative; z-index: 2 }
.industries .label { color: var(--yellow) }
.industries h2 { font-size: clamp(32px, 4vw, 42px); font-weight: 800; margin-bottom: 16px; letter-spacing: -1px }
.industries p { color: #94a3b8; max-width: 700px; margin: 0 auto 48px; line-height: 1.65; font-size: 16px }
.industry-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px }
.industry {
  background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px; padding: 32px 16px; transition: all 0.25s ease;
}
.industry:hover { transform: translateY(-4px); background: rgba(255, 255, 255, 0.06); border-color: rgba(255,255,255,0.2); }
.industry-icon-wrap { font-size: 32px; margin-bottom: 16px; color: var(--yellow); display: flex; justify-content: center; }
.industry-icon-wrap svg { width: 32px; height: 32px; fill: none; stroke: currentColor; stroke-width: 2px; }
.industry strong { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #f1f5f9 }

.process-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; text-align: left }
.step { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 32px; box-shadow: var(--shadow) }
.num {
  width: 40px; height: 40px; border-radius: 8px; background: var(--soft); color: var(--blue);
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; margin-bottom: 24px;
}
.step h3 { font-size: 19px; font-weight: 700; color: var(--navy); margin-bottom: 10px }
.step p { color: var(--muted); line-height: 1.6; font-size: 14.5px }

.cta {
  background: linear-gradient(135deg, #0b1c33, #041021); border-radius: 16px; margin: 40px 6%;
  padding: 56px; display: flex; justify-content: space-between; align-items: center;
  gap: 40px; color: #fff; border: 1px solid rgba(255,255,255,0.05); box-shadow: var(--shadow-hover);
}
.cta h2 { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px }
.cta p { font-size: 16px; color: #94a3b8; line-height: 1.5 }
.cta .btn { background: var(--blue); color: #fff; box-shadow: 0 10px 25px rgba(0,111,230,0.3) }
.cta .btn:hover { background: var(--blue2); }

<script>
const nav=document.getElementById('nav');
const mobileMenu=document.getElementById('mobileMenu');
if(mobileMenu&&nav){
  mobileMenu.addEventListener('click',()=>nav.classList.toggle('active'));
}

const reveals=document.querySelectorAll('.reveal');
const observer=new IntersectionObserver(entries=>{\n  entries.forEach(entry=>{\n    if(entry.isIntersecting){\n      entry.target.classList.add('show');\n    }\n  });\n},{threshold:.1});
reveals.forEach(el=>observer.observe(el));

function getHeaderOffset(){
  const header=document.querySelector('.header');
  return header ? header.offsetHeight + 22 : 120;
}

function setServiceValue(link){
  const value=link.getAttribute('data-service');
  const service=document.getElementById('service');
  if(value && service){
    service.value=value;
  }
}

document.querySelectorAll('a[href^="#"]').forEach(link=>{
  link.addEventListener('click',event=>{
    const href=link.getAttribute('href');
    if(!href || href==='#') return;

    const target=document.querySelector(href);
    if(!target) return;

    event.preventDefault();
    setServiceValue(link);

    const top=target.getBoundingClientRect().top + window.pageYOffset - getHeaderOffset();
    window.scrollTo({top:Math.max(top,0),behavior:'smooth'});
    history.pushState(null,'',href);
  });
});

// ENVÍO DE FORMULARIO POR OBJETO JSON SEGURO PARA AJAX
document.getElementById('contact-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const form = this;
    const successMessage = document.getElementById('form-success');

    const data = {
        first_name: form.first_name.value,
        last_name: form.last_name.value,
        email: form.email.value,
        company: form.company.value,
        service: form.service.value,
        message: form.message.value
    };

    fetch('https://formsubmit.co/ajax/sales@horizonstonepro.com', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response error');
        }
        return response.json();
    })
    .then(res => {
        form.style.display = 'none';
        successMessage.style.display = 'block';
    })
    .catch(error => {
        console.error('Error:', error);
        alert('There was a problem submitting your form. Please try again.');
    });
});
</script>
</body>
</html>
